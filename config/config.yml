Global:
  model : Transformer
  data_path: "./data/"
  result_path: "./results/"
  features: 12
  out_features: 6
  time_steps: 72
  max_steps: 24
  pred_steps: 24
  batch_size: 16
  train_ratio: 0.7
  test_ratio: 0.3
  patience: 5
  experiment_rounds : 2
  mode: train

  device : auto
  dropout: 0.1
  learning_rate: 0.0001
  weight_decay: 0.005
  epochs: 25
  save_epochs: 1
  max_grad_norm: 1.0

Transformer:
  pre_processing: time_space_emb
  enc_layers: 6
  dec_layers: 6
  model_dim: 512
  num_heads: 8
  head_dim: 64
